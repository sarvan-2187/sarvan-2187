name: Update profile card

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate hero card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python scripts/generate_assets.py

      - name: Generate coding-profile card
        continue-on-error: true
        run: node scripts/generate-codolio.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/hero_dark.svg assets/hero_light.svg assets/codolio.svg
          git diff --staged --quiet || git commit -m "chore: refresh profile stats [skip ci]"
          git push
